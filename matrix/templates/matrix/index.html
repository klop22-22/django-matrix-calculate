{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix</title>
    <link rel="stylesheet" href="{% static 'matrix/css/index.css' %}">
</head>
<body>
    <div id="header">
        Матрицы
        <a href="{% url 'matrix:article' %}">Статьи</a>
    </div>
    <div><a href="{% url 'users:login' %}">Войти</a></div>
    <div><a href="{% url 'users:registration' %}">Регистрация</a></div>
    <div><a href="{% url 'users:profile' %}">Профиль</a></div>
    <div><a href="{% url 'users:logout' %}">Выход</a></div>
    {% if user.is_superuser or user.is_staff %}
        <div><a href="{% url 'admin:index' %}">Админ-панель</a></div>
    {% endif %}
    <div class="matrix">
        <p id="matrixa">Матрица A</p>
         {% for i in rows %}
            <div class="rows">
            {% for j in columns %}
                <div class="cell">
                    <input type="text" name="cell_{{ i }}_{{ j }}" 
                           value="0" size="4">
                </div>
            {% endfor %}
            </div>
        {% endfor %}
    </div>
</body>
</html>
