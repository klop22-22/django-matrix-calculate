{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="{% static 'users/css/registration.css' %}">
</head>
<body>
    <div><a href="{% url 'users:login' %}">Войти</a></div>
    <div>
        <form action="{% url 'users:registration' %}" method="post">
            {% csrf_token %}
            <p>{{ registration_form.username.label_tag }} {{ registration_form.username }}</p>
            <p>{{ registration_form.password1.label_tag }} {{ registration_form.password1 }}</p>
            <p>{{ registration_form.password2.label_tag }} {{ registration_form.password2 }}</p>
            <button type="submit">Авторизоваться</button>
        </form>
    </div>
</body>
</html>
